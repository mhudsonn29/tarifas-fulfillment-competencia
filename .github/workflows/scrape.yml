name: Scrape Tarifas Fulfillment

on:
  # Cada 48 horas (cron: minuto hora dia mes dia-semana)
  schedule:
    - cron: '0 8 */2 * *'  # A las 8:00 AM cada 2 días
  
  # Permitir ejecución manual
  workflow_dispatch:
  
  # También al hacer push a main (para testing)
  push:
    branches: [main]

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pages: write
      id-token: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run scraper
        run: python scraper/main.py
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
