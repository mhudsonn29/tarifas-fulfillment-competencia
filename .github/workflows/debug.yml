name: Debug HTML Estructura

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Guardar HTML de paginas
        run: python scraper/debug_html.py

      - name: Commit HTMLs para analisis
        run: |
          git config --global user.name  'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add debug_html/
          git diff --staged --quiet || git commit -m "debug: guardar HTML de paginas para analizar estructura [skip ci]"
          git push
